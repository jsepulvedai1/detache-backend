version: '3.7'

services:
  evolution_api:
    image: evoapicloud/evolution-api:latest
    container_name: evolution_api
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=admin_apikey_123
      # --- Fix Database Error ---
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=sqlite
      - DATABASE_CONNECTION_URI=file:/evolution/instances/database.sqlite
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - evolution_net

networks:
  evolution_net:
    driver: bridge

volumes:
  evolution_instances:
